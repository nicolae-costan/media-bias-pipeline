version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: media-bias-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mediabias123
      - POSTGRES_DB=media_bias
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
